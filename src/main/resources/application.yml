spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reelance
    username: reelance_user
    password: reelance123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Swagger UI Configuration
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    syntax-highlight:
      activated: true
      theme: dracula
  show-actuator: false

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
